<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#be123c"/>
    </radialGradient>
    <radialGradient id="fur" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fce7f3"/>
    </radialGradient>
  </defs>

  <!-- Fundo circular -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>

  <!-- Pelo externo (pompom) — camada de fundo -->
  <ellipse cx="100" cy="108" rx="56" ry="52" fill="url(#fur)"/>

  <!-- Pelagem fofinha ao redor (círculos pequenos simulando pelo) -->
  <circle cx="58"  cy="80"  r="18" fill="white" opacity="0.9"/>
  <circle cx="72"  cy="62"  r="15" fill="white" opacity="0.85"/>
  <circle cx="94"  cy="56"  r="16" fill="white" opacity="0.9"/>
  <circle cx="116" cy="60"  r="15" fill="white" opacity="0.85"/>
  <circle cx="134" cy="76"  r="17" fill="white" opacity="0.9"/>
  <circle cx="142" cy="98"  r="14" fill="white" opacity="0.8"/>
  <circle cx="136" cy="120" r="13" fill="white" opacity="0.8"/>
  <circle cx="62"  cy="104" r="14" fill="white" opacity="0.8"/>
  <circle cx="60"  cy="126" r="12" fill="white" opacity="0.75"/>

  <!-- Pelagem adicional lateral -->
  <circle cx="78"  cy="52"  r="12" fill="white" opacity="0.8"/>
  <circle cx="108" cy="50"  r="11" fill="white" opacity="0.75"/>
  <circle cx="126" cy="66"  r="11" fill="white" opacity="0.75"/>
  <circle cx="144" cy="112" r="11" fill="white" opacity="0.75"/>

  <!-- Rosto do cachorro -->
  <!-- Cabeça -->
  <ellipse cx="100" cy="105" rx="36" ry="34" fill="#fff5f5"/>

  <!-- Olhos -->
  <ellipse cx="88"  cy="98" rx="6" ry="7" fill="#1c1917"/>
  <ellipse cx="112" cy="98" rx="6" ry="7" fill="#1c1917"/>
  <!-- Brilho dos olhos -->
  <circle cx="91"  cy="95" r="2.5" fill="white"/>
  <circle cx="115" cy="95" r="2.5" fill="white"/>

  <!-- Nariz -->
  <ellipse cx="100" cy="112" rx="7" ry="5" fill="#9f1239"/>
  <ellipse cx="100" cy="111" rx="5" ry="3" fill="#be123c"/>
  <!-- Linha nariz -->
  <line x1="100" y1="117" x2="100" y2="120" stroke="#9f1239" stroke-width="1.5"/>
  <path d="M 94 120 Q 100 124 106 120" stroke="#9f1239" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Orelhas -->
  <ellipse cx="72"  cy="88" rx="12" ry="9" fill="#fce7f3" transform="rotate(-25,72,88)"/>
  <ellipse cx="128" cy="88" rx="12" ry="9" fill="#fce7f3" transform="rotate(25,128,88)"/>

  <!-- Bochechas blush -->
  <ellipse cx="82"  cy="114" rx="9" ry="6" fill="#fb7185" opacity="0.35"/>
  <ellipse cx="118" cy="114" rx="9" ry="6" fill="#fb7185" opacity="0.35"/>

  <!-- Pata pequena no canto inferior -->
  <g transform="translate(130,148) scale(0.7)" opacity="0.9">
    <ellipse cx="0" cy="0" rx="14" ry="11" fill="white"/>
    <circle cx="-9" cy="-11" r="5" fill="white"/>
    <circle cx="-2" cy="-14" r="5.5" fill="white"/>
    <circle cx="6"  cy="-12" r="5" fill="white"/>
  </g>
</svg>
