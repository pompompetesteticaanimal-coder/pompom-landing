# Rate limiting — usa X-Forwarded-For (Cloud Run passa o IP real do cliente aqui)
limit_req_zone $http_x_forwarded_for zone=pompom:10m rate=20r/s;

server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Oculta versão do nginx
    server_tokens off;

    # Charset
    charset utf-8;

    # Limita body de requisições (site estático — nenhum upload esperado)
    client_max_body_size 16k;

    # Rate limiting — max 20 req/s por IP, burst de 40, rejeita excesso com 429
    limit_req zone=pompom burst=40 nodelay;
    limit_req_status 429;

    # IP real via Cloud Run (load balancer do Google)
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 0.0.0.0/0;

    # ── Security Headers ────────────────────────────────────────────────────

    # Content Security Policy — única fonte de verdade (remove meta CSP dos HTMLs)
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://storage.googleapis.com https:;
        frame-src https://maps.google.com https://www.google.com https://maps.googleapis.com https://maps.gstatic.com;
        connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://maps.googleapis.com;
        object-src 'none';
        base-uri 'self';
        form-action 'none';
        frame-ancestors 'none';
        upgrade-insecure-requests;
    " always;

    # HSTS — força HTTPS por 1 ano, inclui subdomínios, elegível para preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Impede clickjacking (reforça frame-ancestors da CSP para clientes mais antigos)
    add_header X-Frame-Options "DENY" always;

    # Impede MIME-type sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Controla informações de referência enviadas ao navegar para links externos
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Bloqueia acesso a hardware desnecessário
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;

    # Isola contexto de navegação — protege contra ataques Spectre cross-origin
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Impede que outros sites leiam nossos recursos via fetch/XHR cross-origin
    add_header Cross-Origin-Resource-Policy "same-site" always;

    # ── Cache Control ────────────────────────────────────────────────────────

    # HTML: nunca servir de cache — sempre buscar versão atualizada do servidor
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        # Repete security headers (location block sobrescreve server block no nginx)
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://storage.googleapis.com https:; frame-src https://maps.google.com https://www.google.com https://maps.googleapis.com https://maps.gstatic.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://maps.googleapis.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), bluetooth=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-site" always;
        try_files $uri =404;
    }

    # Imagens/fontes/SVG: cache longo (1 ano) — imutáveis no Cloud Run
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
