<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PomPom Pet</title>
  <style>
    body { margin: 0; background: #fdf6f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: Inter, sans-serif; }
    .loader { text-align: center; color: #e11d48; }
    .paw { font-size: 48px; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.2);opacity:0.7} }
  </style>
  <script>
    // Detecta dispositivo e redireciona imediatamente
    (function() {
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
        || window.innerWidth < 768;
      window.location.replace(isMobile ? 'mobile.html' : 'desktop.html');
    })();
  </script>
</head>
<body>
  <div class="loader">
    <div class="paw">🐾</div>
    <p style="color:#9f1239;font-size:14px;margin-top:12px">Carregando...</p>
  </div>
</body>
</html>
